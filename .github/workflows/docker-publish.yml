name: Build and Push to GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.owner.outputs.owner }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/forge-frontend
          tags: |
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: ./pwa
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Make package public
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/user/packages/container/${{ steps.owner.outputs.owner }}%2Fforge-frontend/visibility" || echo "WARN: Could not make public via API"

  build-trainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.owner.outputs.owner }}
          password: ${{ secrets.GHCR_PAT }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/forge-trainer
          tags: |
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: ./trainer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Make package public
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/user/packages/container/${{ steps.owner.outputs.owner }}%2Fforge-trainer/visibility" || echo "WARN: Could not make public via API"
